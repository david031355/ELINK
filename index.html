<!DOCTYPE html>
<html lang="he" dir="rtl" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELINK - מחולל קישורים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
        }
        /* עיצוב גלילה מותאם לחלונית העריכה */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-100 dark:bg-gray-900 transition-colors duration-300 relative">

    <!-- Top Action Buttons (Theme & Language) -->
    <div class="absolute top-4 w-full max-w-7xl px-4 flex justify-between left-1/2 -translate-x-1/2 z-10">
        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-md text-gray-800 dark:text-yellow-400 hover:scale-110 transition-transform focus:outline-none" data-i18n-title="themeToggle">
            <i id="themeIcon" class="fas fa-moon text-xl"></i>
        </button>
        
        <!-- Language Toggle -->
        <button onclick="toggleLanguage()" class="py-2 px-4 rounded-full bg-white dark:bg-gray-800 shadow-md text-gray-800 dark:text-gray-200 hover:scale-105 transition-transform focus:outline-none font-bold text-sm flex items-center gap-2">
            <i class="fas fa-globe"></i>
            <span id="langBtnText">English</span>
        </button>
    </div>

    <!-- Main Container -->
    <div class="flex flex-col lg:flex-row gap-6 items-start justify-center w-full max-w-5xl mt-16 lg:mt-10">
        
        <!-- Main Form Panel -->
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full lg:max-w-lg transition-colors duration-300">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight" data-i18n="appTitle">ELINK</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium" data-i18n="appSubtitle">מחולל הקישורים החכם</p>
            </div>

            <div class="space-y-5">
                <!-- בחירת תוכנית -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="selectProgramLabel">בחר תוכנית:</label>
                    <div class="flex gap-2">
                        <select id="programSelect" class="flex-1 w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            <!-- האפשרויות יטענו לכאן דינמית באמצעות JS על פי הסדר האישי -->
                        </select>
                        <!-- כפתור עריכת סדר -->
                        <button onclick="openReorderModal()" class="px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600 rounded-lg transition-colors text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500" data-i18n-title="editOrderBtnTitle" title="שנה סדר רשימה">
                            <i class="fas fa-sort-amount-down"></i>
                        </button>
                    </div>
                </div>

                <!-- בחירת תאריך -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="dateSelect" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="selectDateLabel">בחר תאריך:</label>
                        <input type="date" id="dateSelect" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label for="partSelect" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="partOptionalLabel">חלק (אופציונלי):</label>
                        <input type="text" id="partSelect" placeholder="למשל: a או b" data-i18n-placeholder="partPlaceholder" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>

                <!-- כפתור יצירה -->
                <button id="generateBtn" onclick="generateLink()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all flex justify-center items-center gap-2">
                    <i class="fas fa-link"></i> <span data-i18n="generateLinkBtn">הפק קישור</span>
                </button>

                <!-- אזור תוצאה -->
                <div id="resultArea" class="hidden mt-6 space-y-4">
                    
                    <!-- שדה לינק מלא -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedLinkLabel">הקישור שהופק:</label>
                        <div class="relative">
                            <textarea id="output" readonly class="w-full pl-12 pr-4 py-3 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-left font-mono text-sm h-24 resize-none focus:outline-none transition-colors" dir="ltr"></textarea>
                            
                            <div class="absolute top-3 left-3 flex flex-col gap-2">
                                <button onclick="copyToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyLinkTitle" title="העתק קישור">
                                    <i class="fas fa-copy text-xl"></i>
                                </button>
                                <a id="openLinkBtn" href="#" target="_blank" class="text-gray-500 dark:text-gray-400 hover:text-green-600 dark:hover:text-green-400 transition-colors" data-i18n-title="openNewTabTitle" title="פתח בטאב חדש">
                                    <i class="fas fa-external-link-alt text-xl"></i>
                                </a>
                            </div>
                        </div>
                        <div id="copyMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copySuccessMsg">הקישור הועתק בהצלחה!</div>
                    </div>

                    <!-- שדה שם קובץ -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedFileNameLabel">שם הקובץ:</label>
                        <div class="relative">
                            <input type="text" id="fileNameOutput" readonly class="w-full pl-12 pr-4 py-3 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-left font-mono text-sm focus:outline-none transition-colors" dir="ltr">
                            
                            <div class="absolute top-3 left-3 flex flex-col gap-2">
                                <button onclick="copyFileNameToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyFileNameTitle" title="העתק שם קובץ">
                                    <i class="fas fa-copy text-xl"></i>
                                </button>
                            </div>
                        </div>
                        <div id="copyFileNameMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copyFileNameSuccessMsg">שם הקובץ הועתק בהצלחה!</div>
                    </div>

                    <!-- שדה תאריך משולב -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedDateLabel">יום ותאריך:</label>
                        <div class="relative">
                            <input type="text" id="combinedDateOutput" readonly class="w-full pl-12 pr-4 py-3 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-right font-mono text-sm focus:outline-none transition-colors" dir="rtl">
                            
                            <div class="absolute top-3 left-3 flex flex-col gap-2">
                                <button onclick="copyCombinedDateToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyDateTitle" title="העתק יום ותאריך">
                                    <i class="fas fa-copy text-xl"></i>
                                </button>
                            </div>
                        </div>
                        <div id="copyCombinedDateMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copyDateSuccessMsg">היום והתאריך הועתקו בהצלחה!</div>
                    </div>

                </div>
                
            </div>
            
            <!-- הקדשה אישית -->
            <div class="mt-8 pt-4 border-t border-gray-200 dark:border-gray-700 text-center">
                <p class="text-xs font-medium text-gray-400 dark:text-gray-500 italic tracking-wider">
                    Written specially for Eli from Monsey
                </p>
            </div>
        </div>

        <!-- Quick Copy Side Panel (Collapsible) -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full lg:w-72 transition-colors duration-300 self-start">
            <button onclick="toggleQuickCopy()" class="w-full flex justify-between items-center p-6 bg-transparent focus:outline-none group">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white" data-i18n="quickCopyTitle">העתקה מהירה</h3>
                <i id="quickCopyChevron" class="fas fa-chevron-down text-gray-500 dark:text-gray-400 transition-transform duration-300"></i>
            </button>
            
            <div id="quickCopyContent" class="hidden px-6 pb-6 pt-0 border-t border-gray-100 dark:border-gray-700">
                <div class="flex flex-col gap-3 mt-4">
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcDay1">יום ראשון</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcDay2">יום שני</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcDay3">יום שלישי</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcDay4">יום רביעי</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcDay5">יום חמישי</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcErevShabbat">ערב שבת פרשת</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                    <button onclick="copyQuickText(this)" class="w-full flex justify-between items-center px-4 py-3 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 rounded-lg transition-colors text-gray-700 dark:text-gray-200 font-medium group text-sm">
                        <span data-i18n="qcMotash">מוצאי שבת פרשת</span>
                        <i class="fas fa-copy text-gray-400 group-hover:text-blue-500 transition-colors"></i>
                    </button>
                </div>
                <div id="quickCopyMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-4 hidden text-center" data-i18n="quickCopySuccessMsg">הטקסט הועתק בהצלחה!</div>
            </div>
        </div>
    </div>

    <!-- Modal לסידור הרשימה -->
    <div id="reorderModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" style="max-height: 85vh;">
            <div class="p-5 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white" data-i18n="reorderTitle">סידור רשימת התוכניות</h3>
                <button onclick="closeReorderModal()" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-2 custom-scrollbar bg-gray-100 dark:bg-gray-900" id="reorderList">
                <!-- הרשימה תתרנדר לכאן -->
            </div>
            
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-between gap-3 bg-white dark:bg-gray-800">
                <button onclick="resetOrder()" class="px-4 py-2 text-sm font-semibold text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors border border-gray-300 dark:border-gray-600 rounded-lg hover:border-blue-400 dark:hover:border-blue-500" data-i18n="reorderResetBtn">שחזר ברירת מחדל</button>
                <div class="flex gap-2">
                    <button onclick="closeReorderModal()" class="px-4 py-2 text-sm font-semibold text-gray-600 dark:text-gray-300 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded-lg transition-colors" data-i18n="reorderCancelBtn">ביטול</button>
                    <button onclick="saveOrder()" class="px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-md" data-i18n="reorderSaveBtn">שמור שינויים</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- מסד הנתונים הראשי של התוכניות ---
        const programsData = [
            { id: "prog_Gil_Israelov", value: '{"type":"programs", "folder":"Gil_Israelov", "prefix":"Gil_Israelov", "yearLen":4}' },
            { id: "prog_Mendy_Weiss", value: '{"type":"programs", "folder":"Mendy_Weiss", "prefix":"Mendy_Weiss", "yearLen":4}' },
            { id: "prog_Avi_Ilson", value: '{"type":"programs", "folder":"Avi_Ilson", "prefix":"Avi_Ilson", "yearLen":2}' },
            { id: "prog_Hershey_Eisenbach", value: '{"type":"programs", "folder":"Hershey_Eisenbach", "prefix":"Hershey_Eisenbach", "yearLen":4}' },
            { id: "prog_Eli_Klein", value: '{"type":"programs", "folder":"Eli_Klein", "prefix":"Klein", "yearLen":4}' },
            { id: "prog_Yehuda_Galili", value: '{"type":"programs", "folder":"Yehuda_Galili", "prefix":"Yehuda_Galili", "yearLen":4}' },
            { id: "prog_Bardak", value: '{"type":"programs", "folder":"Bardak", "prefix":"Bardak", "yearLen":2}' },
            { id: "prog_Habama_Hamerkzit", value: '{"type":"programs", "folder":"Habama_Hamerkzit", "prefix":"Habama_Hamerkzit", "yearLen":2}' },
            { id: "prog_Kobi_Sela", value: '{"type":"programs", "folder":"Kobi_Sela", "prefix":"Kobis", "yearLen":2}' },
            { id: "prog_Yaron_Bar", value: '{"type":"programs", "folder":"Yaron_Bar", "prefix":"Yaron_Bar", "yearLen":4}' },
            { id: "prog_Ackerman", value: '{"type":"programs", "folder":"Ackerman", "prefix":"Ackerman", "yearLen":2}' },
            { id: "prog_Kobi_mendy", value: '{"type":"programs", "folder":"Kobi_mendy", "prefix":"Kobi_mendy", "yearLen":2}' },
            { id: "prog_Avremi_Roth", value: '{"type":"programs", "folder":"Avremi_Roth", "prefix":"Avremi_Roth", "yearLen":2}' },
            { id: "prog_Eli_Friedman", value: '{"type":"programs", "folder":"Eli_Friedman", "prefix":"Eli_Friedman", "yearLen":4}' },
            { id: "prog_Naftali_kempeh", value: '{"type":"programs", "folder":"Naftali_kempeh", "prefix":"Naftali_kempeh", "yearLen":4}' },
            { id: "prog_meni_shwartz", value: '{"type":"programs", "folder":"meni_shwartz", "prefix":"meni_shwartz", "yearLen":4}' },
            { id: "prog_Erez_Shmueli", value: '{"type":"programs", "folder":"Erez_Shmueli", "prefix":"Erez_Shmueli", "yearLen":4}' },
            { id: "prog_Yuval_Stupel", value: '{"type":"programs", "folder":"Yuval_Stupel", "prefix":"Yuval_Stupel", "yearLen":4}' },
            { id: "prog_Beketzev_hayom", value: '{"type":"programs", "folder":"Beketzev_hayom", "prefix":"Beketzev_hayom", "yearLen":2}' },
            { id: "prog_Kobi_brumer", value: '{"type":"programs", "folder":"Kobi_brumer", "prefix":"kobi_brumer", "yearLen":2}' },
            { id: "prog_Yehuda_Dim", value: '{"type":"programs", "folder":"Yehuda_Dim", "prefix":"Dim", "yearLen":4}' },
            { id: "prog_Bayamim_Hahem", value: '{"type":"programs", "folder":"Bayamim_Hahem", "prefix":"Bayamim_Hahem", "yearLen":4}' },
            { id: "prog_Yakov_Bloch", value: '{"type":"programs", "folder":"Yakov_Bloch", "prefix":"Yakov_Bloch", "yearLen":4}' },
            { id: "prog_Ephraim_Kamisar", value: '{"type":"programs", "folder":"Ephraim_Kamisar", "prefix":"Ephraim_Kamisar", "yearLen":4}' },
            { id: "prog_Until_Lag_Baomer", value: '{"type":"programs", "folder":"Until_Lag_Baomer", "prefix":"Until_Lag_Baomer", "yearLen":2}' },
            { id: "prog_Gideon_Levine", value: '{"type":"programs", "folder":"Gideon_Levine", "prefix":"Gideon_Levine", "yearLen":2}' },
            { id: "prog_Zvi_Weiss", value: '{"type":"programs", "folder":"Zvi_Weiss", "prefix":"Zvi_Weiss", "yearLen":4}' },
            { id: "prog_Ruli_Ezrachi", value: '{"type":"programs", "folder":"Ruli_Ezrachi", "prefix":"Ruli_Ezrachi", "yearLen":4}' },
            { id: "prog_YourMelody", value: '{"type":"podcasts", "folder":"YourMelody", "prefix":"Hamangina_Shelachem", "yearLen":2}' }
        ];

        // טעינת הסדר המותאם אישית מהזיכרון
        let currentOrder = [];
        function initOrder() {
            try {
                const saved = localStorage.getItem('app_programs_order');
                if (saved) {
                    currentOrder = JSON.parse(saved);
                    // הוספת תוכניות חדשות שאולי נוספו למערכת ולא היו בסדר השמור
                    programsData.forEach(p => {
                        if (!currentOrder.includes(p.id)) currentOrder.push(p.id);
                    });
                    // סינון תוכניות ישנות שאולי הוסרו
                    currentOrder = currentOrder.filter(id => programsData.some(p => p.id === id));
                } else {
                    currentOrder = programsData.map(p => p.id); // ברירת מחדל
                }
            } catch (e) {
                currentOrder = programsData.map(p => p.id);
            }
        }
        initOrder();

        // מילון התרגומים
        const i18n = {
            he: {
                appTitle: "ELINK",
                appSubtitle: "מחולל הקישורים החכם",
                selectProgramLabel: "בחר תוכנית:",
                selectProgramPlaceholder: "-- בחר מרשימת התוכניות --",
                selectDateLabel: "בחר תאריך:",
                partOptionalLabel: "חלק (אופציונלי):",
                partPlaceholder: "למשל: a או b",
                generateLinkBtn: "הפק קישור",
                generateLinkLoading: "מייצר...",
                generatedLinkLabel: "הקישור שהופק:",
                copySuccessMsg: "הקישור הועתק בהצלחה!",
                generatedFileNameLabel: "שם הקובץ:",
                copyFileNameTitle: "העתק שם קובץ",
                copyFileNameSuccessMsg: "שם הקובץ הועתק בהצלחה!",
                generatedDateLabel: "יום ותאריך:",
                copyDateTitle: "העתק יום ותאריך",
                copyDateSuccessMsg: "היום והתאריך הועתקו בהצלחה!",
                themeToggle: "החלף מצב תצוגה",
                copyLinkTitle: "העתק קישור",
                openNewTabTitle: "פתח בטאב חדש",
                alertNoProgram: "אנא בחר תוכנית מהרשימה",
                alertNoDate: "אנא בחר תאריך",
                alertCopyFail: "ההעתקה נכשלה. אנא העתק ידנית.",
                langBtnText: "English",
                quickCopyTitle: "העתקה מהירה",
                qcDay1: "יום ראשון",

        let currentLang = localStorage.getItem('app_lang') || 'he';

        // רינדור רשימת הבחירה לפי הסדר האישי
        function populateSelect() {
            const select = document.getElementById('programSelect');
            const savedVal = select.value; // שמירת הבחירה הנוכחית כדי לא לאפס אותה
            
            select.innerHTML = `<option value="" disabled selected data-i18n="selectProgramPlaceholder">-- בחר מרשימת התוכניות --</option>`;
            
            currentOrder.forEach(id => {
                const prog = programsData.find(p => p.id === id);
                if (prog) {
                    const opt = document.createElement('option');
                    opt.value = prog.value;
                    opt.setAttribute('data-i18n', prog.id);
                    // יתורגם מיד ע"י applyLanguage
                    select.appendChild(opt);
                }
            });

            if (savedVal) select.value = savedVal;
        }

        function initLanguage() {
            populateSelect();
            applyLanguage(currentLang);
        }

        function toggleLanguage() {
            currentLang = currentLang === 'he' ? 'en' : 'he';
            localStorage.setItem('app_lang', currentLang);
            applyLanguage(currentLang);
        }

        function applyLanguage(lang) {
            const doc = document.documentElement;
            doc.lang = lang;
            doc.dir = lang === 'he' ? 'rtl' : 'ltr';

            const t = i18n[lang];

            // עדכון טקסטים רגילים ורשימות בחירה
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });

            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                if (t[key]) el.title = t[key];
            });

            document.getElementById('langBtnText').textContent = t.langBtnText;
            document.title = t.appTitle + " - " + (lang === 'he' ? "מחולל קישורים" : "Link Generator");
        }

        function getAlertMsg(key) {
            return i18n[currentLang][key];
        }

        // אתחול מצב כהה לפי העדפות השמורות בדפדפן
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // פונקציית החלפת ערכת הנושא (כהה/בהיר) שהיתה חסרה
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // --- ניהול מודאל סידור רשימה ---
        let tempOrder = []; // מערך זמני בזמן שהמודאל פתוח

        function openReorderModal() {
            tempOrder = [...currentOrder];
            renderReorderList();
            
            const modal = document.getElementById('reorderModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
        }

        function closeReorderModal() {
            const modal = document.getElementById('reorderModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function renderReorderList() {
            const listEl = document.getElementById('reorderList');
            listEl.innerHTML = '';
            
            tempOrder.forEach((id, index) => {
                const prog = programsData.find(p => p.id === id);
                if(!prog) return;

                const t = i18n[currentLang];
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white dark:bg-gray-800 p-3 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 transition-all";
                div.innerHTML = `
                    <span class="text-gray-800 dark:text-gray-200 font-medium text-sm flex-1 ml-2 rtl:ml-0 rtl:mr-2">${t[prog.id]}</span>
                    <div class="flex gap-1">
                        <button onclick="moveItem(${index}, -1)" class="${index === 0 ? 'text-gray-300 dark:text-gray-600 cursor-not-allowed' : 'text-gray-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-gray-700'} w-8 h-8 flex items-center justify-center rounded-md transition-colors focus:outline-none" ${index === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-up"></i>
                        </button>
                        <button onclick="moveItem(${index}, 1)" class="${index === tempOrder.length - 1 ? 'text-gray-300 dark:text-gray-600 cursor-not-allowed' : 'text-gray-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-gray-700'} w-8 h-8 flex items-center justify-center rounded-md transition-colors focus:outline-none" ${index === tempOrder.length - 1 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-down"></i>
                        </button>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        function moveItem(index, direction) {
            if (index + direction < 0 || index + direction >= tempOrder.length) return;
            const temp = tempOrder[index];
            tempOrder[index] = tempOrder[index + direction];
            tempOrder[index + direction] = temp;
            renderReorderList(); // רינדור מחדש של הרשימה בחלון צף
        }

        function saveOrder() {
            currentOrder = [...tempOrder];
            localStorage.setItem('app_programs_order', JSON.stringify(currentOrder));
            initLanguage(); // ירנדר מחדש גם את ה-Select הראשי ויחיל שפה
            closeReorderModal();
        }

        function resetOrder() {
            if(confirm(currentLang === 'he' ? "האם אתה בטוח שברצונך לשחזר את הרשימה למצבה המקורי?" : "Are you sure you want to reset the list to its original order?")) {
                tempOrder = programsData.map(p => p.id);
                renderReorderList();
            }
        }

        // הפעלת שפה בטעינה (מכיל קריאה לבניית הרשימה הדינמית)
        initLanguage();

        // פונקציית פתיחה/סגירה של פאנל העתקה מהירה
        function toggleQuickCopy() {
            const content = document.getElementById('quickCopyContent');
            const chevron = document.getElementById('quickCopyChevron');
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                chevron.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                chevron.style.transform = 'rotate(0deg)';
            }
        }

        // פונקציית העתקה מהירה מפאנל הצד
        function copyQuickText(btnElement) {
            const textToCopy = btnElement.querySelector('span').innerText;
            const tempInput = document.createElement("input");
            tempInput.value = textToCopy;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                const msg = document.getElementById('quickCopyMsg');
                msg.classList.remove('hidden');
                setTimeout(() => {
                    msg.classList.add('hidden');
                }, 2500);
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert(getAlertMsg('alertCopyFail'));
            }
            
            document.body.removeChild(tempInput);
        }

        // פונקציית יצירת הקישור
        async function generateLink() {
            const programSelect = document.getElementById('programSelect').value;
            const dateVal = document.getElementById('dateSelect').value;
            const partVal = document.getElementById('partSelect').value.trim().toLowerCase();
            const btn = document.getElementById('generateBtn');
            const originalBtnHtml = btn.innerHTML;
            
            if (!programSelect) {
                alert(getAlertMsg('alertNoProgram'));
                return;
            }
            if (!dateVal) {
                alert(getAlertMsg('alertNoDate'));
                return;
            }

            // אנימציית טעינה בכפתור
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${getAlertMsg('generateLinkLoading')}</span>`;
            btn.disabled = true;

            try {
                const programDataJSON = JSON.parse(programSelect);
                
                // חילוץ חלקי התאריך
                const [year, month, day] = dateVal.split('-');

                // פורמט שנה
                const fileYear = programDataJSON.yearLen === 2 ? year.slice(-2) : year;

                // יצירת שם הקובץ בלבד
                const baseFileName = `${programDataJSON.prefix}${day}-${month}-${fileYear}${partVal}`;
                const fileNameWithExt = `${baseFileName}.mp3`;

                // קריאה ל-API חיצוני (Hebcal)
                let formattedHebrewDate = "";
                try {
                    const hebcalUrl = `https://www.hebcal.com/converter?cfg=json&gy=${year}&gm=${parseInt(month)}&gd=${parseInt(day)}&g2h=1`;
                    const response = await fetch(hebcalUrl);
                    const data = await response.json();
                    
                    if (data && data.hebrew) {
                        formattedHebrewDate = data.hebrew.replace(/[\u0591-\u05C7]/g, '');
                    } else {
                        formattedHebrewDate = "שגיאה בהמרה";
                    }
                } catch (error) {
                    console.error("Hebcal API error:", error);
                    formattedHebrewDate = "שגיאת רשת";
                }

                const dateObjForDay = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                const dayIndex = dateObjForDay.getDay();
                const daysPrefixes = ["יום ראשון", "יום שני", "יום שלישי", "יום רביעי", "יום חמישי", "ערב שבת", "מוצאי שבת"];
                let dayName = daysPrefixes[dayIndex];

                if (dayIndex === 5 || dayIndex === 6) {
                    try {
                        const saturdayDate = new Date(dateObjForDay);
                        saturdayDate.setDate(dateObjForDay.getDate() + (6 - dayIndex));
                        const satYear = saturdayDate.getFullYear();
                        const satMonth = saturdayDate.getMonth() + 1;
                        const satDay = saturdayDate.getDate();
                        
                        const satDateString = `${satYear}-${String(satMonth).padStart(2, '0')}-${String(satDay).padStart(2, '0')}`;

                        const parashaUrl = `https://www.hebcal.com/hebcal?v=1&cfg=json&gy=${satYear}&gm=${satMonth}&s=on&lg=h`;
                        const pRes = await fetch(parashaUrl);
                        const pData = await pRes.json();
                        
                        let parashaName = "";
                        if (pData && pData.items) {
                            const itemsOnSat = pData.items.filter(i => i.date === satDateString);
                            
                            const parashaItem = itemsOnSat.find(i => i.category === 'parashat');
                            const specialShabbat = itemsOnSat.find(i => i.hebrew && i.hebrew.startsWith('שבת ') && !i.hebrew.includes('מבָרְכִים'));
                            
                            let pName = parashaItem ? parashaItem.hebrew.replace(/[\u0591-\u05C7]/g, '') : "";
                            let sName = specialShabbat ? specialShabbat.hebrew.replace(/[\u0591-\u05C7]/g, '') : "";

                            if (sName) {
                                parashaName = sName.replace("שבת ", ""); 
                            } else if (pName) {
                                parashaName = pName;
                                if (!parashaName.startsWith("פרשת ")) {
                                    parashaName = "פרשת " + parashaName;
                                }
                            }
                        }

                        if (parashaName) {
                            dayName = `${dayName} ${parashaName}`;
                        }
                    } catch (err) {
                        console.error("Parasha API error:", err);
                    }
                }

                const combinedDate = `${dayName} - ${formattedHebrewDate} / ${day}/${month}/${year}`;

                const basePath = `/upload/mp3/${programDataJSON.type}`;
                const relativeLink = `${basePath}/${programDataJSON.folder}/${year}/${month}/${fileNameWithExt}`;

                document.getElementById('output').value = relativeLink;
                document.getElementById('fileNameOutput').value = baseFileName;
                document.getElementById('combinedDateOutput').value = combinedDate;
                
                const openLinkBtn = document.getElementById('openLinkBtn');
                openLinkBtn.href = `https://media.kcm.fm${relativeLink}`;
                
                document.getElementById('resultArea').classList.remove('hidden');
                
                document.getElementById('copyMsg').classList.add('hidden');
                document.getElementById('copyFileNameMsg').classList.add('hidden');
                document.getElementById('copyCombinedDateMsg').classList.add('hidden');
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        function copyToClipboard() {
            const outputEl = document.getElementById('output');
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyMsg');
                msg.classList.remove('hidden');
                setTimeout(() => { msg.classList.add('hidden'); }, 3000);
            } catch (err) { alert(getAlertMsg('alertCopyFail')); }
            document.body.removeChild(tempInput);
        }

        function copyFileNameToClipboard() {
            const outputEl = document.getElementById('fileNameOutput');
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyFileNameMsg');
                msg.classList.remove('hidden');
                setTimeout(() => { msg.classList.add('hidden'); }, 3000);
            } catch (err) { alert(getAlertMsg('alertCopyFail')); }
            document.body.removeChild(tempInput);
        }

        function copyCombinedDateToClipboard() {
            const outputEl = document.getElementById('combinedDateOutput');
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyCombinedDateMsg');
                msg.classList.remove('hidden');
                setTimeout(() => { msg.classList.add('hidden'); }, 3000);
            } catch (err) { alert(getAlertMsg('alertCopyFail')); }
            document.body.removeChild(tempInput);
        }
