<!DOCTYPE html>
<html lang="he" dir="rtl" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELINK - מחולל קישורים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 bg-gray-100 dark:bg-gray-900 transition-colors duration-300 relative">

    <!-- Top Action Buttons (Theme & Language) -->
    <div class="absolute top-4 w-full max-w-7xl px-4 flex justify-between left-1/2 -translate-x-1/2 z-10">
        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="p-3 rounded-full bg-white dark:bg-gray-800 shadow-md text-gray-800 dark:text-yellow-400 hover:scale-110 transition-transform focus:outline-none" data-i18n-title="themeToggle">
            <i id="themeIcon" class="fas fa-moon text-xl"></i>
        </button>
        
        <!-- Language Toggle -->
        <button onclick="toggleLanguage()" class="py-2 px-4 rounded-full bg-white dark:bg-gray-800 shadow-md text-gray-800 dark:text-gray-200 hover:scale-105 transition-transform focus:outline-none font-bold text-sm flex items-center gap-2">
            <i class="fas fa-globe"></i>
            <span id="langBtnText">English</span>
        </button>
    </div>

    <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-lg transition-colors duration-300 mt-10">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight" data-i18n="appTitle">ELINK</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium" data-i18n="appSubtitle">מחולל הקישורים החכם</p>
        </div>

        <div class="space-y-5">
            <!-- בחירת תוכנית -->
            <div>

                    <option value="" disabled selected data-i18n="selectProgramPlaceholder">-- בחר מרשימת התוכניות --</option>
                    
                    <optgroup label="תוכניות יומיות / שבועיות" data-i18n-label="dailyProgramsGroup">
                        <option value='{"type":"programs", "folder":"Gil_Israelov", "prefix":"Gil_Israelov", "yearLen":4}' data-i18n="prog_Gil_Israelov">גיל ישראלוב</option>
                        <option value='{"type":"programs", "folder":"Mendy_Weiss", "prefix":"Mendy_Weiss", "yearLen":4}' data-i18n="prog_Mendy_Weiss">מנדי וייס</option>
                        <option value='{"type":"programs", "folder":"Avi_Ilson", "prefix":"Avi_Ilson", "yearLen":2}' data-i18n="prog_Avi_Ilson">אבי אילסון</option>
                        <option value='{"type":"programs", "folder":"Hershey_Eisenbach", "prefix":"Hershey_Eisenbach", "yearLen":4}' data-i18n="prog_Hershey_Eisenbach">הרשי אייזנבך</option>
                        <option value='{"type":"programs", "folder":"Eli_Klein", "prefix":"Klein", "yearLen":4}' data-i18n="prog_Eli_Klein">אלי קליין</option>
                        <option value='{"type":"programs", "folder":"Yehuda_Galili", "prefix":"Yehuda_Galili", "yearLen":4}' data-i18n="prog_Yehuda_Galili">יהודה גלילי</option>
                        <option value='{"type":"programs", "folder":"Bardak", "prefix":"Bardak", "yearLen":2}' data-i18n="prog_Bardak">ברדק</option>
                        <option value='{"type":"programs", "folder":"Habama_Hamerkzit", "prefix":"Habama_Hamerkzit", "yearLen":2}' data-i18n="prog_Habama_Hamerkzit">הבמה המרכזית</option>
                        <option value='{"type":"programs", "folder":"Kobi_Sela", "prefix":"Kobis", "yearLen":2}' data-i18n="prog_Kobi_Sela">קובי סלע</option>
                        <option value='{"type":"programs", "folder":"Yaron_Bar", "prefix":"Yaron_Bar", "yearLen":4}' data-i18n="prog_Yaron_Bar">ירון בר</option>
                        <option value='{"type":"programs", "folder":"Ackerman", "prefix":"Ackerman", "yearLen":2}' data-i18n="prog_Ackerman">אקרמן</option>
                        <option value='{"type":"programs", "folder":"Kobi_mendy", "prefix":"Kobi_mendy", "yearLen":2}' data-i18n="prog_Kobi_mendy">קובי ומנדי</option>
                        <option value='{"type":"programs", "folder":"Avremi_Roth", "prefix":"Avremi_Roth", "yearLen":2}' data-i18n="prog_Avremi_Roth">אברמי רוט</option>
                        <option value='{"type":"programs", "folder":"Eli_Friedman", "prefix":"Eli_Friedman", "yearLen":4}' data-i18n="prog_Eli_Friedman">אלי פרידמן</option>
                        <option value='{"type":"programs", "folder":"Naftali_kempeh", "prefix":"Naftali_kempeh", "yearLen":4}' data-i18n="prog_Naftali_kempeh">נפתלי קמפה</option>
                        <option value='{"type":"programs", "folder":"meni_shwartz", "prefix":"meni_shwartz", "yearLen":4}' data-i18n="prog_meni_shwartz">מני שוורץ</option>
                        <option value='{"type":"programs", "folder":"Erez_Shmueli", "prefix":"Erez_Shmueli", "yearLen":4}' data-i18n="prog_Erez_Shmueli">ארז שמואלי</option>
                        <option value='{"type":"programs", "folder":"Yuval_Stupel", "prefix":"Yuval_Stupel", "yearLen":4}' data-i18n="prog_Yuval_Stupel">יובל סטופל</option>
                        <option value='{"type":"programs", "folder":"Beketzev_hayom", "prefix":"Beketzev_hayom", "yearLen":2}' data-i18n="prog_Beketzev_hayom">בקצב היום</option>
                        <option value='{"type":"programs", "folder":"Kobi_brumer", "prefix":"kobi_brumer", "yearLen":2}' data-i18n="prog_Kobi_brumer">קובי ברומר</option>
                        <option value='{"type":"programs", "folder":"Yehuda_Dim", "prefix":"Dim", "yearLen":4}' data-i18n="prog_Yehuda_Dim">יהודה דים</option>
                        <option value='{"type":"programs", "folder":"Bayamim_Hahem", "prefix":"Bayamim_Hahem", "yearLen":4}' data-i18n="prog_Bayamim_Hahem">בימים ההם</option>
                        <option value='{"type":"programs", "folder":"Yakov_Bloch", "prefix":"Yakov_Bloch", "yearLen":4}' data-i18n="prog_Yakov_Bloch">יעקב בלוך</option>
                        <option value='{"type":"programs", "folder":"Ephraim_Kamisar", "prefix":"Ephraim_Kamisar", "yearLen":4}' data-i18n="prog_Ephraim_Kamisar">אפרים קמיסר</option>
                        <option value='{"type":"programs", "folder":"Until_Lag_Baomer", "prefix":"Until_Lag_Baomer", "yearLen":2}' data-i18n="prog_Until_Lag_Baomer">עד ל"ג בעומר</option>
                        <option value='{"type":"programs", "folder":"Gideon_Levine", "prefix":"Gideon_Levine", "yearLen":2}' data-i18n="prog_Gideon_Levine">גדעון לוין</option>
                        <option value='{"type":"programs", "folder":"Zvi_Weiss", "prefix":"Zvi_Weiss", "yearLen":4}' data-i18n="prog_Zvi_Weiss">צבי וייס</option>
                    </optgroup>
                    
                    <optgroup label="פודקאסטים" data-i18n-label="podcastsGroup">
                        <option value='{"type":"podcasts", "folder":"YourMelody", "prefix":"Hamangina_Shelachem", "yearLen":2}' data-i18n="prog_YourMelody">המנגינה שלכם</option>
                    </optgroup>
                </select>
            </div>

            <!-- בחירת תאריך -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="dateSelect" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="selectDateLabel">בחר תאריך:</label>
                    <input type="date" id="dateSelect" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label for="partSelect" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="partOptionalLabel">חלק (אופציונלי):</label>
                    <input type="text" id="partSelect" placeholder="למשל: a או b" data-i18n-placeholder="partPlaceholder" class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <!-- כפתור יצירה -->
            <button onclick="generateLink()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition-all flex justify-center items-center gap-2">
                <i class="fas fa-link"></i> <span data-i18n="generateLinkBtn">הפק קישור</span>
            </button>

            <!-- אזור תוצאה -->
            <div id="resultArea" class="hidden mt-6 space-y-4">
                
                <!-- שדה לינק מלא -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedLinkLabel">הקישור שהופק:</label>
                    <div class="relative">
                        <textarea id="output" readonly class="w-full px-4 py-3 pr-20 ltr:pl-20 ltr:pr-4 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-left font-mono text-sm h-24 resize-none focus:outline-none transition-colors" dir="ltr"></textarea>
                        
                        <div class="absolute top-3 right-3 rtl:right-3 ltr:left-3 ltr:right-auto flex flex-col gap-2">
                            <button onclick="copyToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyLinkTitle" title="העתק קישור">
                                <i class="fas fa-copy text-xl"></i>
                            </button>
                            <a id="openLinkBtn" href="#" target="_blank" class="text-gray-500 dark:text-gray-400 hover:text-green-600 dark:hover:text-green-400 transition-colors" data-i18n-title="openNewTabTitle" title="פתח בטאב חדש">
                                <i class="fas fa-external-link-alt text-xl"></i>
                            </a>
                        </div>
                    </div>
                    <div id="copyMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copySuccessMsg">הקישור הועתק בהצלחה!</div>
                </div>

                <!-- שדה שם קובץ -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedFileNameLabel">שם הקובץ:</label>
                    <div class="relative">
                        <input type="text" id="fileNameOutput" readonly class="w-full px-4 py-3 pr-12 ltr:pl-12 ltr:pr-4 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-left font-mono text-sm focus:outline-none transition-colors" dir="ltr">
                        
                        <div class="absolute top-3 right-3 rtl:right-3 ltr:left-3 ltr:right-auto flex flex-col gap-2">
                            <button onclick="copyFileNameToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyFileNameTitle" title="העתק שם קובץ">
                                <i class="fas fa-copy text-xl"></i>
                            </button>
                        </div>
                    </div>
                    <div id="copyFileNameMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copyFileNameSuccessMsg">שם הקובץ הועתק בהצלחה!</div>
                </div>

                <!-- שדה תאריך משולב -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1" data-i18n="generatedDateLabel">יום ותאריך:</label>
                    <div class="relative">
                        <input type="text" id="combinedDateOutput" readonly class="w-full px-4 py-3 pr-12 ltr:pl-12 ltr:pr-4 rounded-lg bg-gray-100 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 text-right font-mono text-sm focus:outline-none transition-colors" dir="rtl">
                        
                        <div class="absolute top-3 left-3 flex flex-col gap-2">
                            <button onclick="copyCombinedDateToClipboard()" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" data-i18n-title="copyDateTitle" title="העתק יום ותאריך">
                                <i class="fas fa-copy text-xl"></i>
                            </button>
                        </div>
                    </div>
                    <div id="copyCombinedDateMsg" class="text-green-600 dark:text-green-400 text-sm font-semibold mt-2 hidden text-center" data-i18n="copyDateSuccessMsg">היום והתאריך הועתקו בהצלחה!</div>
                </div>

            </div>
            
        </div>
        
        <!-- הקדשה אישית -->
        <div class="mt-8 pt-4 border-t border-gray-200 dark:border-gray-700 text-center">
            <p class="text-xs font-medium text-gray-400 dark:text-gray-500 italic tracking-wider">
                Written specially for Eli from Monsey
            </p>
        </div>
    </div>

    <script>
        // מילון התרגומים
        const i18n = {
            he: {
                appTitle: "ELINK",
                appSubtitle: "מחולל הקישורים החכם",
                selectProgramLabel: "בחר תוכנית:",

                prog_Yehuda_Dim: "יהודה דים",
                prog_Bayamim_Hahem: "בימים ההם",
                prog_Yakov_Bloch: "יעקב בלוך",
                prog_Ephraim_Kamisar: "אפרים קמיסר",
                prog_Until_Lag_Baomer: 'עד ל"ג בעומר',
                prog_Gideon_Levine: "גדעון לוין",
                prog_Zvi_Weiss: "צבי וייס",
                prog_YourMelody: "המנגינה שלכם"
            },
            en: {
                appTitle: "ELINK",
                appSubtitle: "The Smart Link Generator",
                selectProgramLabel: "Select Program:",
                selectProgramPlaceholder: "-- Select from the list --",
                dailyProgramsGroup: "Daily / Weekly Programs",
                podcastsGroup: "Podcasts",
                selectDateLabel: "Select Date:",

                prog_Erez_Shmueli: "Erez Shmueli",

                prog_Gideon_Levine: "Gideon Levine",
                prog_Zvi_Weiss: "Zvi Weiss",
                prog_YourMelody: "Hamangina Shelachem"
            }
        };

        // ניהול שפות
        let currentLang = localStorage.getItem('app_lang') || 'he';

        function initLanguage() {
            applyLanguage(currentLang);
        }

        function toggleLanguage() {
            currentLang = currentLang === 'he' ? 'en' : 'he';
            localStorage.setItem('app_lang', currentLang);
            applyLanguage(currentLang);
        }

        function applyLanguage(lang) {
            const doc = document.documentElement;
            doc.lang = lang;
            doc.dir = lang === 'he' ? 'rtl' : 'ltr';

            const t = i18n[lang];

            // עדכון טקסטים רגילים
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            // עדכון פלייסחולדרים
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key]) el.placeholder = t[key];
            });

            // עדכון optgroups
            document.querySelectorAll('[data-i18n-label]').forEach(el => {
                const key = el.getAttribute('data-i18n-label');
                if (t[key]) el.label = t[key];
            });

            // עדכון titles (tooltips)
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.getAttribute('data-i18n-title');
                if (t[key]) el.title = t[key];
            });

            // עדכון כפתור שפה
            document.getElementById('langBtnText').textContent = t.langBtnText;
            
            // עדכון כותרת המסמך
            document.title = t.appTitle + " - " + (lang === 'he' ? "מחולל קישורים" : "Link Generator");
        }

        // פונקציית שליפת הודעות למערכת ההתראות מהמילון
        function getAlertMsg(key) {
            return i18n[currentLang][key];
        }

        // אתחול מצב כהה לפי העדפות השמורות בדפדפן
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // הפעלת שפה בטעינה
        initLanguage();

        // פונקציית החלפת ערכת הנושא (כהה/בהיר)
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        // פונקציית יצירת הקישור
        async function generateLink() {
            const programSelect = document.getElementById('programSelect').value;
            const dateVal = document.getElementById('dateSelect').value;
            const partVal = document.getElementById('partSelect').value.trim().toLowerCase();
            
            if (!programSelect) {
                alert(getAlertMsg('alertNoProgram'));
                return;
            }
            if (!dateVal) {
                alert(getAlertMsg('alertNoDate'));
                return;
            }

            const programData = JSON.parse(programSelect);
            
            // חילוץ חלקי התאריך ישירות מהמחרוזת כדי למנוע בעיות של אזורי זמן (למשל בארה"ב)
            const [year, month, day] = dateVal.split('-');

            // פורמט שנה לסוף הקובץ
            const fileYear = programData.yearLen === 2 ? year.slice(-2) : year;

            // יצירת שם הקובץ בלבד (ללא סיומת)
            const baseFileName = `${programData.prefix}${day}-${month}-${fileYear}${partVal}`;
            const fileNameWithExt = `${baseFileName}.mp3`;

            // חישוב היום בשבוע בצורה בטוחה מאזורי זמן
            const dateObjForDay = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
            const daysHe = ["יום ראשון", "יום שני", "יום שלישי", "יום רביעי", "יום חמישי", "יום שישי", "שבת"];
            const dayIndex = dateObjForDay.getDay();
            const dayName = daysHe[dayIndex]; // תמיד יציג בעברית

            // קריאה ל-API חיצוני (Hebcal) לקבלת התאריך העברי באותיות תקניות
            let formattedHebrewDate = "";
            try {
                const hebcalUrl = `https://www.hebcal.com/converter?cfg=json&gy=${year}&gm=${parseInt(month)}&gd=${parseInt(day)}&g2h=1`;
                const response = await fetch(hebcalUrl);
                const data = await response.json();
                
                if (data && data.hebrew) {
                    // ה-API מחזיר טקסט עם ניקוד, אז ננקה את הניקוד בעזרת Regex כדי לקבל טקסט נקי
                    formattedHebrewDate = data.hebrew.replace(/[\u0591-\u05C7]/g, '');
                } else {
                    formattedHebrewDate = "שגיאה בהמרה";
                }
            } catch (error) {
                console.error("Hebcal API error:", error);
                formattedHebrewDate = "שגיאת רשת";
            }

            const combinedDate = `${dayName} ${formattedHebrewDate} / ${day}/${month}/${year}`;

            // הרכבת הלינק הסופי להעתקה (יחסי)
            const basePath = `/upload/mp3/${programData.type}`;
            const relativeLink = `${basePath}/${programData.folder}/${year}/${month}/${fileNameWithExt}`;

            // הצגת התוצאה (לינק מלא)
            const outputEl = document.getElementById('output');
            outputEl.value = relativeLink;

            // הצגת התוצאה (שם קובץ בלבד ללא סיומת)
            const fileNameOutputEl = document.getElementById('fileNameOutput');
            fileNameOutputEl.value = baseFileName;

            // הצגת התוצאה (יום ותאריך משולב)
            const combinedDateOutputEl = document.getElementById('combinedDateOutput');
            combinedDateOutputEl.value = combinedDate;
            
            // עדכון כפתור הפתיחה בטאב חדש עם הקישור המלא
            const openLinkBtn = document.getElementById('openLinkBtn');
            openLinkBtn.href = `https://media.kcm.fm${relativeLink}`;
            
            document.getElementById('resultArea').classList.remove('hidden');
            
            // איפוס הודעות העתקה אם היו מוצגות
            document.getElementById('copyMsg').classList.add('hidden');
            document.getElementById('copyFileNameMsg').classList.add('hidden');
            document.getElementById('copyCombinedDateMsg').classList.add('hidden');
        }

        // פונקציית העתקה ללוח - לינק מלא
        function copyToClipboard() {
            const outputEl = document.getElementById('output');
            
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyMsg');
                msg.classList.remove('hidden');
                setTimeout(() => {
                    msg.classList.add('hidden');
                }, 3000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert(getAlertMsg('alertCopyFail'));
            }
            
            document.body.removeChild(tempInput);
        }

        // פונקציית העתקה ללוח - יום ותאריך
        function copyDateToClipboard() {
            const outputEl = document.getElementById('dateOutput');
            
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyDateMsg');
                msg.classList.remove('hidden');
                setTimeout(() => {
                    msg.classList.add('hidden');
                }, 3000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert(getAlertMsg('alertCopyFail'));
            }
            
            document.body.removeChild(tempInput);
        }

        // פונקציית העתקה ללוח - יום ותאריך משולב
        function copyCombinedDateToClipboard() {
            const outputEl = document.getElementById('combinedDateOutput');
            
            const tempInput = document.createElement("input");
            tempInput.value = outputEl.value;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                document.execCommand("copy");
                const msg = document.getElementById('copyCombinedDateMsg');
                msg.classList.remove('hidden');
                setTimeout(() => {
                    msg.classList.add('hidden');
                }, 3000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
                alert(getAlertMsg('alertCopyFail'));
            }
            
            document.body.removeChild(tempInput);
        }
    </script>
</body>
